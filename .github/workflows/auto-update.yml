name: Daily Auto Commit

on:
  schedule:
    # Runs daily at morning IST (12:30 AM UTC / 6:00 AM IST)
    - cron: '30 0 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make commits
        run: |
          git config --global user.email "iamramm8@gmail.com"
          git config --global user.name "Sriram Gandhi S"
          
          FILES=("TODO.md" "BUGS.md" "testing-notes.txt" "future-updates.md" "dev-notes.md")
          
          # Randomize cycle count between 1 and 2 (2 to 4 commits)
          MIN_CYCLES=1
          MAX_CYCLES=2
          CYCLES=$((MIN_CYCLES + RANDOM % (MAX_CYCLES - MIN_CYCLES + 1)))
          echo "Selected random cycle count: $CYCLES"
          
          for i in $(seq 1 $CYCLES)
          do
            # Pick a random developer note file to modify
            SELECTED_FILE=${FILES[$RANDOM % ${#FILES[@]}]}
            echo "Starting cycle $i on file: $SELECTED_FILE"
            
            # Define project-specific natural commit messages based on file type
            case "$SELECTED_FILE" in
              "TODO.md")
                ADD_MSGS=(
                  "docs: add responsive mobile layout checklist to todo"
                  "docs: update project portfolio component tasks"
                  "docs: mark footer layout styling as active in todo"
                  "docs: update lighthouse optimization checklist items"
                )
                DEL_MSGS=(
                  "docs: clean up completed todo items"
                  "docs: remove resolved tasks from todo checklist"
                  "docs: formatting adjustments in todo list"
                )
                ;;
              "BUGS.md")
                ADD_MSGS=(
                  "docs: add Safari mobile menu touch bug to tracker"
                  "docs: document console warn on key prop in bug log"
                  "docs: log image layout shift rendering issue"
                )
                DEL_MSGS=(
                  "docs: resolve and remove tracked items in bug log"
                  "docs: clean up obsolete bug status reports"
                  "docs: minor clean up of bugs tracking document"
                )
                ;;
              "future-updates.md")
                ADD_MSGS=(
                  "docs: add 3D component roadmap to future updates"
                  "docs: write draft for dark mode support plan"
                  "docs: add portfolio blog section integration ideas"
                )
                DEL_MSGS=(
                  "docs: clean up future updates formatting"
                  "docs: refine feature updates roadmap outline"
                  "docs: normalize layout of future updates list"
                )
                ;;
              "testing-notes.txt")
                ADD_MSGS=(
                  "test: log local dev testing on desktop Chrome/Safari"
                  "test: document hover animation checks in testing notes"
                  "test: update local responsive layout check logs"
                )
                DEL_MSGS=(
                  "test: prune old browser test reports in testing notes"
                  "test: formatting updates to testing notes"
                  "test: clean up testing notes checklist"
                )
                ;;
              "dev-notes.md")
                ADD_MSGS=(
                  "docs: write development setup notes for vite config"
                  "docs: update build package optimization details"
                  "docs: document Tailwind CSS configuration changes"
                )
                DEL_MSGS=(
                  "docs: clean up formatting in dev notes"
                  "docs: remove deprecated package instructions"
                  "docs: normalize dev notes layout"
                )
                ;;
            esac
            
            # Step 1: ADD
            echo " " >> $SELECTED_FILE
            msg_add=${ADD_MSGS[$RANDOM % ${#ADD_MSGS[@]}]}
            git add $SELECTED_FILE
            git commit -m "$msg_add"
            git push origin HEAD:${{ github.ref_name }}
            
            # Sleep between ADD and DEL (random 20 to 45 minutes)
            sleep $((1200 + RANDOM % 1500))
            
            # Step 2: DEL
            sed -i '$d' $SELECTED_FILE
            msg_del=${DEL_MSGS[$RANDOM % ${#DEL_MSGS[@]}]}
            git add $SELECTED_FILE
            git commit -m "$msg_del"
            git push origin HEAD:${{ github.ref_name }}
            
            # Sleep between cycles (random 30 to 60 minutes)
            sleep $((1800 + RANDOM % 1800))
          done
